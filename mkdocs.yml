site_name: fin-ratios
site_description: "The most comprehensive open-source financial ratios library. 136+ ratios, 10 scoring models, TypeScript + Python."
site_url: https://piyushgupta344.github.io/fin-ratios/
repo_url: https://github.com/piyushgupta344/fin-ratios
repo_name: piyushgupta344/fin-ratios
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: false
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            heading_level: 3

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
    - Bring Your Own Data: byod.md
  - Scoring Models:
    - Overview: scoring/index.md
    - Economic Moat Score: scoring/moat.md
    - Capital Allocation Score: scoring/capital-allocation.md
    - Earnings Quality Score: scoring/earnings-quality.md
    - Quality Factor Score: scoring/quality-factor.md
    - Valuation Attractiveness Score: scoring/valuation.md
    - Management Quality Score: scoring/management.md
    - Dividend Safety Score: scoring/dividend-safety.md
    - Investment Score: scoring/investment.md
  - Ratio Reference:
    - Valuation: ratios/valuation.md
    - Profitability: ratios/profitability.md
    - Liquidity: ratios/liquidity.md
    - Solvency: ratios/solvency.md
    - Efficiency: ratios/efficiency.md
    - Cash Flow: ratios/cashflow.md
    - Growth: ratios/growth.md
    - Risk & Portfolio: ratios/risk.md
    - Composite Scores: ratios/composite.md
    - Sector Ratios: ratios/sector.md
  - Data Fetchers:
    - Yahoo Finance: fetchers/yahoo.md
    - SEC EDGAR: fetchers/edgar.md
    - FMP: fetchers/fmp.md
    - Alpha Vantage: fetchers/alphavantage.md
    - Polygon.io: fetchers/polygon.md
    - SimFin: fetchers/simfin.md
  - Utilities:
    - Batch Compute: utils/compute-all.md
    - Historical Trends: utils/trends.md
    - Scenario DCF: utils/scenario-dcf.md
    - Peer Comparison: utils/peers.md
    - Sector Benchmarks: utils/benchmarks.md
    - Fair Value Range: utils/fair-value.md
    - Backtesting: utils/backtest.md
    - Portfolio Quality: utils/portfolio.md
  - Integrations:
    - Pandas & Polars: integrations/dataframes.md
    - Jupyter Notebooks: integrations/jupyter.md
    - FastAPI REST Server: integrations/fastapi.md
    - MCP Server (Claude): integrations/mcp.md
    - React Hooks: integrations/react.md
  - CLI Reference: cli.md
  - TypeScript API: typescript.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/piyushgupta344/fin-ratios
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/financial-ratios/
    - icon: fontawesome/brands/npm
      link: https://npmjs.com/package/fin-ratios

