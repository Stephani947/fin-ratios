name: Publish to JSR

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write  # required for JSR OIDC publishing

jobs:
  publish-jsr:
    name: Publish to jsr.io
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        run: cd typescript && npm ci

      - name: Sync jsr.json version from package.json
        run: |
          cd typescript
          VERSION=$(node -p "require('./package.json').version")
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('jsr.json', 'utf8'));
            j.version = '$VERSION';
            fs.writeFileSync('jsr.json', JSON.stringify(j, null, 2) + '\n');
          "
          echo "jsr.json version set to $VERSION"

      - name: Typecheck
        run: cd typescript && npx tsc --noEmit

      - name: Publish to JSR
        # Requires @fin-ratios/core scope to be created first at https://jsr.io/new?scope=fin-ratios&package=core
        # Until the scope is registered this step is allowed to fail — it does not block PyPI/npm releases
        continue-on-error: true
        run: cd typescript && npx jsr publish
