name: Publish to JSR

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write  # required for JSR OIDC publishing

jobs:
  publish-jsr:
    name: Publish to jsr.io
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        run: cd typescript && npm ci

      - name: Typecheck
        run: cd typescript && npx tsc --noEmit

      - name: Publish to JSR
        run: cd typescript && npx jsr publish --allow-dirty
