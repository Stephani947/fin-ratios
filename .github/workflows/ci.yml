name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e "./python[dev]"

      - name: Run tests
        run: pytest python/tests/ -q --tb=short -m "not network"

  typescript:
    name: TypeScript Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        run: cd typescript && npm ci

      - name: Type check
        run: cd typescript && npx tsc --noEmit

      - name: Run tests
        run: cd typescript && npm test

      - name: Build
        run: cd typescript && npm run build

  publish-check:
    name: Package Build Check
    runs-on: ubuntu-latest
    needs: [python, typescript]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build and validate Python package
        run: |
          pip install build twine
          cd python && python -m build
          twine check dist/*

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Build and validate npm package
        run: |
          cd typescript && npm ci && npm run build
          npm pack --dry-run
        working-directory: typescript
