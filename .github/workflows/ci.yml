name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core
        run: |
          cd python
          pip install -e "."

      - name: Run core tests
        run: |
          cd python
          python -m pytest tests/ -v --tb=short

      - name: Install fetchers extras
        run: |
          cd python
          pip install -e ".[fetchers]"

      - name: Run fetcher tests (skip network)
        run: |
          cd python
          python -m pytest tests/ -v -m "not network" --tb=short

  typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        run: cd typescript && npm ci

      - name: Type check
        run: cd typescript && npx tsc --noEmit

      - name: Run tests
        run: cd typescript && npm test

      - name: Build
        run: cd typescript && npm run build

  publish-check:
    name: Package Build Check
    runs-on: ubuntu-latest
    needs: [python, typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python package builds
        run: |
          pip install build twine
          cd python
          python -m build
          twine check dist/*

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check npm package builds
        run: |
          cd typescript
          npm ci
          npm run build
          npm pack --dry-run
