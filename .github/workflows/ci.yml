name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check python/fin_ratios/

      - name: Ruff format check
        run: ruff format --check python/fin_ratios/

  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Copy README and LICENSE for hatchling
        run: cp README.md LICENSE python/

      - name: Install package + dev dependencies
        run: pip install -e "./python[dev]"

      - name: Run tests
        run: pytest python/tests/ -q --tb=short -m "not network"

  typescript:
    name: TypeScript Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        run: cd typescript && npm ci

      - name: Type check
        run: cd typescript && npx tsc --noEmit

      - name: Run tests
        run: cd typescript && npm test

      - name: Build
        run: cd typescript && npm run build

  docs:
    name: Docs Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs
        run: |
          pip install \
            mkdocs-material \
            mkdocstrings[python] \
            mkdocs-git-revision-date-localized-plugin

      - name: Build docs (strict)
        run: mkdocs build --strict

  examples:
    name: Validate Examples
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Copy README and LICENSE for hatchling
        run: cp README.md LICENSE python/

      - name: Install package
        run: pip install -e "./python"

      - name: Run Python examples
        run: |
          for f in examples/*.py python/examples/*.py; do
            [ -f "$f" ] || continue
            echo "Running $f"
            python "$f"
          done

  publish-check:
    name: Package Build Check
    runs-on: ubuntu-latest
    needs: [lint, python, typescript]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build and validate Python package
        run: |
          cp README.md LICENSE python/
          pip install build twine
          cd python && python -m build && rm -f README.md LICENSE
          twine check dist/*

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Build and validate npm package
        working-directory: typescript
        run: |
          npm ci && npm run build
          npm pack --dry-run
