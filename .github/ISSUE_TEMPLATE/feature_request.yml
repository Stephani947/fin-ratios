name: Feature Request
description: Suggest an enhancement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, check the [CHANGELOG](https://github.com/piyushgupta344/fin-ratios/blob/main/CHANGELOG.md) and open issues to avoid duplicates.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New scoring model / utility
        - New fetcher / data source
        - CLI improvement
        - Pandas / Polars integration
        - FastAPI / MCP server
        - React hooks
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Clear description of the feature and the problem it solves.
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API (optional)
      description: Sketch the function signature or interface you have in mind.
      render: python

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds have you tried?
